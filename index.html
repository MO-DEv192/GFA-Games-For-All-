<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Rocket League Game</title>
    <style>
        canvas {
            background: #f0f0f0;
            display: block;
            margin: 0 auto;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>
    <h1>GFA Rocket League</h1>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const player = { x: 50, y: 200, width: 50, height: 30, color: 'blue', speed: 5 };
        const opponent = { x: 700, y: 200, width: 50, height: 30, color: 'red', speed: 3 };
        const ball = { x: 400, y: 200, radius: 10, speedX: 5, speedY: 3 };
        let playerScore = 0;
        let opponentScore = 0;

        function drawRect(x, y, width, height, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, width, height);
        }

        function drawBall(x, y, radius) {
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();
        }

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw player and opponent
            drawRect(player.x, player.y, player.width, player.height, player.color);
            drawRect(opponent.x, opponent.y, opponent.width, opponent.height, opponent.color);

            // Draw ball
            drawBall(ball.x, ball.y, ball.radius);

            // Move ball
            ball.x += ball.speedX;
            ball.y += ball.speedY;

            // Ball collision with walls
            if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
                ball.speedY *= -1;
            }

            // Ball collision with paddles
            if (ball.x <= player.x + player.width && ball.y >= player.y && ball.y <= player.y + player.height) {
                ball.speedX *= -1;
                playerScore++;
            } else if (ball.x + ball.radius >= opponent.x && ball.y >= opponent.y && ball.y <= opponent.y + opponent.height) {
                ball.speedX *= -1;
                opponentScore++;
            }

            // Update opponent AI
            if (ball.y > opponent.y + opponent.height / 2) {
                opponent.y += opponent.speed;
            } else if (ball.y < opponent.y) {
                opponent.y -= opponent.speed;
            }

            // Draw scores
            ctx.font = '20px Arial';
            ctx.fillText(`Player: ${playerScore}`, 20, 30);
            ctx.fillText(`Opponent: ${opponentScore}`, canvas.width - 150, 30);

            requestAnimationFrame(update);
        }

        document.addEventListener('keydown', function(event) {
            if (event.key === 'ArrowUp' && player.y > 0) {
                player.y -= player.speed;
            }
            if (event.key === 'ArrowDown' && player.y + player.height < canvas.height) {
                player.y += player.speed;
            }
        });

        update();  
    </script>
</body>
</html>
