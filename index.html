<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Poki-like Game Portal</title>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }\n        header { background-color: #282c34; color: white; padding: 20px; text-align: center; }\n        #search { margin: 20px; }\n        #game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; padding: 20px; }\n        .game-card { border: 1px solid #ddd; border-radius: 5px; overflow: hidden; text-align: center; }\n        .game-card img { width: 100%; }\n        .game-card h3 { margin: 0; padding: 10px; }\n    </style>\n</head>\n<body>\n    <header>\n        <h1>Welcome to the Game Portal</h1>\n        <input type="text" id="search" placeholder="Search games...">\n    </header>\n    <div id="game-grid">\n        <div class="game-card">\n            <img src="game1.jpg" alt="Game 1">\n            <h3>Game 1</h3>\n        </div>\n        <div class="game-card">\n            <img src="game2.jpg" alt="Game 2">\n            <h3>Game 2</h3>\n        </div>\n        <div class="game-card">\n            <img src="game3.jpg" alt="Game 3">\n            <h3>Game 3</h3>\n        </div>\n        <!-- More games can be added here -->\n    </div>\n    <script>\n        // Basic search functionality implementation\n        const searchInput = document.getElementById('search');\n        searchInput.addEventListener('input', function() {\n            const searchValue = this.value.toLowerCase();\n            const gameCards = document.querySelectorAll('.game-card');\n            gameCards.forEach(card => {\n                const gameTitle = card.querySelector('h3').textContent.toLowerCase();\n                card.style.display = gameTitle.includes(searchValue) ? 'block' : 'none';\n            });\n        });\n    </script>\n</body>\n</html>\n
